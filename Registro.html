    <h1 class="T_1"><em>Registro de usuario</em></h1>
    <div class="container d-flex flex-column align-items-center justify-center" style="min-height: 80vh;">
        <form id="registerForm">
            <div>
                <label for="username"><strong>Usuario:</strong></label>
                <input type="text" id="username" name="username" required />
        </div>

        <div>
            <label for="email"><strong>Correo:</strong></label>
            <input type="email" id="email" name="email" required />
        </div>

        <div>
            <label for="password"><strong>Contraseña:</strong></label>
            <input type="password" id="password" name="password" required />
        </div>

        <div>
            <label for="confirm_password"><strong>Confirmar contraseña:</strong></label>
            <input type="password" id="confirm_password" name="confirm_password" required />
        </div>

        <button type="submit"><strong>Registrarse</strong></button>
    </form>

    <p id="registerMessage"></p>

    <script src="./js/auth.js"></script>
    <script>
        const registerForm = document.getElementById("registerForm");
        const registerMessage = document.getElementById("registerMessage");

        registerForm.addEventListener("submit", async function (event) {
            event.preventDefault();

            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const confirm_password = document.getElementById("confirm_password").value;

            const result = await registerUser({ username, email, password, confirm_password });

            registerMessage.textContent = result.message;
            registerMessage.style.color = result.ok ? "green" : "red";
        });
    </script>
